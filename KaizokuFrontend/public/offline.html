<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Offline — Kaizoku.NET</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0a09;
      --surface: #1a1816;
      --border: #2e2b28;
      --text: #f2f0ee;
      --muted: #8a8480;
      --primary: hsl(346.8, 77.2%, 49.8%);
      --primary-light: hsl(346.8, 77.2%, 65%);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f8f7f6;
        --surface: #ffffff;
        --border: #e5e3e0;
        --text: #1a1816;
        --muted: #6b6865;
      }
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      padding: env(safe-area-inset-top, 16px) env(safe-area-inset-right, 16px) env(safe-area-inset-bottom, 16px) env(safe-area-inset-left, 16px);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      border-radius: 14px;
      overflow: hidden;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .wifi-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 16px;
      color: var(--muted);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      color: var(--text);
    }

    p {
      font-size: 0.9375rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: 10px;
      background: var(--primary);
      color: white;
      font-size: 0.9375rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      text-decoration: none;
      min-height: 44px;
      min-width: 44px;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.97); }

    .tag {
      display: inline-block;
      margin-top: 24px;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="/kaizoku.net.png" alt="Kaizoku.NET" />
    </div>

    <svg class="wifi-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M1 1l22 22"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <circle cx="12" cy="20" r="1" fill="currentColor"/>
    </svg>

    <h1>You're offline</h1>
    <p>Kaizoku.NET needs an internet connection to load your manga library. Check your connection and try again.</p>

    <button class="btn" onclick="location.reload()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Try again
    </button>

    <p class="tag">Kaizoku.NET</p>
  </div>
</body>
</html>
